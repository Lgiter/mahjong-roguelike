<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>雀灵试炼</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app" class="app">
      <section id="startScreen" class="screen start-screen">
        <div class="brand">
          <div class="seal">雀</div>
          <h1>雀灵试炼</h1>
          <p>麻将牌型肉鸽 · 点数 × 番数 · 法器构筑</p>
        </div>

        <button id="startBtn" class="primary-btn">开始试炼</button>
      </section>

      <section id="gameScreen" class="screen game-screen hidden">
        <header class="topbar">
          <div>
            <span class="muted">第</span>
            <strong id="stageLabel">1</strong>
            <span class="muted">关</span>
          </div>
          <div>
            <span class="muted">目标</span>
            <strong id="targetLabel">800</strong>
          </div>
          <div>
            <span class="muted">金币</span>
            <strong id="coinLabel">6</strong>
          </div>
        </header>

        <section class="battle">
          <div class="enemy-panel">
            <div class="enemy-head">
              <span id="enemyName">赤鳞妖</span>
              <span id="bossBadge" class="boss-badge hidden">Boss</span>
            </div>
            <div class="hp-bar">
              <div id="hpFill" class="hp-fill"></div>
            </div>
            <div class="enemy-stats">
              <span id="scoreLabel">0</span>
              <span id="handsLabel">出牌 4</span>
              <span id="drawLabel">牌山 0</span>
            </div>
            <p id="ruleLabel" class="rule-label"></p>
          </div>

          <div class="combo-panel">
            <div class="combo-head">
              <div>
                <span class="muted">识别牌型</span>
                <strong id="comboName">请选择 1-5 张牌</strong>
              </div>
              <button id="handHelpBtn" class="mini-btn">牌型说明</button>
            </div>
            <div class="formula">
              <span id="baseLabel">0 点</span>
              <span>×</span>
              <span id="multLabel">0 番</span>
              <span>=</span>
              <strong id="previewLabel">0</strong>
            </div>
            <div id="triggerLog" class="trigger-log"></div>
          </div>
        </section>

        <section class="artifacts-wrap">
          <div class="section-title">
            <span>法器</span>
            <small id="artifactCount">0/5</small>
          </div>
          <div id="artifacts" class="artifacts"></div>
        </section>

        <section class="rulebook-wrap">
          <div class="section-title">
            <span>基础牌力</span>
            <small>固定值，法器会在此基础上加成</small>
          </div>
          <div id="rulebook" class="rulebook"></div>
        </section>

        <section class="hand-wrap">
          <div class="section-title">
            <span>手牌</span>
            <small>选择 1-5 张，任意组合都能出</small>
          </div>
          <div id="hand" class="hand"></div>
        </section>

        <footer class="actions">
          <button id="discardBtn" class="secondary-btn">换牌</button>
          <button id="playBtn" class="primary-btn">出牌</button>
        </footer>

        <div id="toast" class="toast hidden"></div>

        <div id="handHelpModal" class="modal hidden">
          <div class="modal-panel">
            <div class="modal-head">
              <div>
                <span class="muted">固定点番</span>
                <h2>牌型说明</h2>
              </div>
              <button id="closeHandHelpBtn" class="icon-btn">×</button>
            </div>
            <div id="handHelpList" class="help-list"></div>
          </div>
        </div>
      </section>

      <section id="rewardScreen" class="screen reward-screen hidden">
        <div class="reward-head">
          <span id="rewardKicker">过关奖励</span>
          <h2 id="rewardTitle">选择一件法器</h2>
          <p id="rewardSummary"></p>
        </div>
        <div id="rewardOptions" class="reward-options"></div>
      </section>

      <section id="endScreen" class="screen end-screen hidden">
        <div class="brand">
          <div id="endSeal" class="seal">胜</div>
          <h1 id="endTitle">试炼完成</h1>
          <p id="endText"></p>
        </div>
        <button id="restartBtn" class="primary-btn">再来一局</button>
      </section>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
